command_allowlist:
- overwrite system file via redirection
- find -delete
- kill hermes/gateway process (self-termination)
- delete in root path
- script execution via heredoc
- SQL DROP
- stop/restart system service
- script execution via -e/-c flag
- recursive delete
- SQL DELETE without WHERE
